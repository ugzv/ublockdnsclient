name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/ublockdns-${GOOS}-${GOARCH}" .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ublockdns-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/ublockdns-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dist -type f -name 'ublockdns-*' -exec cp {} out/ \;
          (cd out && sha256sum ublockdns-* > SHA256SUMS)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/ublockdns-linux-amd64
            out/ublockdns-linux-arm64
            out/SHA256SUMS
