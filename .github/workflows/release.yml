name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'build --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish script checksums
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shasum -a 256 install.sh install.ps1 setup.ps1 > SCRIPT_SHA256SUMS
          gh release upload "${{ github.ref_name }}" SCRIPT_SHA256SUMS --clobber

  windows-installer:
    needs: goreleaser
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $arch = "${{ matrix.arch }}"

          $assets = @(
            "ublockdns-windows-$arch.exe",
            "SHA256SUMS",
            "install.ps1",
            "setup.ps1"
          )

          foreach ($asset in $assets) {
            $url = "https://github.com/$repo/releases/download/$tag/$asset"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile (Join-Path dist $asset)
          }

      - name: Build GUI installer
        shell: pwsh
        run: |
          Copy-Item "dist/ublockdns-windows-${{ matrix.arch }}.exe" "packaging/windows/ublockdns.exe" -Force
          Copy-Item "dist/install.ps1" "packaging/windows/install.ps1" -Force
          Copy-Item "dist/setup.ps1" "packaging/windows/setup.ps1" -Force

      - name: Compile GUI installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.6
        with:
          path: packaging/windows/ublockdns.iss
          options: /DMyAppVersion=${{ github.ref_name }}

      - name: Normalize GUI installer filename
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Move-Item "packaging/windows/uBlockDNS-Setup.exe" "out/uBlockDNS-Setup-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe" -Force

      - name: Append GUI installer checksum
        shell: pwsh
        run: |
          $gui = "out/uBlockDNS-Setup-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe"
          $hash = (Get-FileHash -Path $gui -Algorithm SHA256).Hash.ToLowerInvariant()
          Add-Content -Path "dist/SHA256SUMS" -Value "$hash  $(Split-Path -Leaf $gui)"

      - name: Upload GUI installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/uBlockDNS-Setup-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
