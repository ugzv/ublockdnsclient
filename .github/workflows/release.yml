name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'build --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows-installer:
    needs: goreleaser
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $arch = "${{ matrix.arch }}"

          $assets = @(
            "ublockdns-windows-$arch.exe",
            "install.ps1",
            "setup.ps1"
          )

          foreach ($asset in $assets) {
            $url = "https://github.com/$repo/releases/download/$tag/$asset"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile (Join-Path dist $asset)
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build GUI installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $tag = "${{ github.ref_name }}"
          $arch = "${{ matrix.arch }}"
          $output = "uBlockDNS-Setup-$tag-windows-$arch"

          & $iscc `
            "/DMyAppVersion=$tag" `
            "/DArch=$arch" `
            "/DSourceExe=dist\\ublockdns-windows-$arch.exe" `
            "/DSourceInstallPs1=dist\\install.ps1" `
            "/DSourceSetupPs1=dist\\setup.ps1" `
            "/DOutputBaseFilename=$output" `
            "/Oout" `
            "packaging\\windows\\ublockdns.iss"

      - name: Upload GUI installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/uBlockDNS-Setup-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
