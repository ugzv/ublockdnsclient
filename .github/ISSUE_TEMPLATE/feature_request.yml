name: Feedback & Feature Request
description: Suggest an improvement or share your experience
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear from you! Whether it's about the client, dashboard, blocking, or anything else — all input is welcome.

  - type: dropdown
    id: area
    attributes:
      label: What area is this about?
      options:
        - Client (installer, service, CLI)
        - Dashboard / website
        - Blocking / filter lists
        - Query log / stats
        - Platform support (new OS, device, etc.)
        - Documentation
        - General feedback
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Tell us what you'd like to see, or what could be improved"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Any extra context — your setup, screenshots, examples from other tools, etc."
    validations:
      required: false
