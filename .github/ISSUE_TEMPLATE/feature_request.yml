name: Feedback & Ideas
description: Suggest an improvement, share your experience, or tell us what you'd like to see
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear from you! All feedback is welcome, big ideas, small tweaks, or just telling us what you think.

  - type: dropdown
    id: area
    attributes:
      label: What's this about?
      options:
        - The client app (installer, setup)
        - The dashboard / website
        - Ad blocking or filter lists
        - A new feature idea
        - Support for a new device or platform
        - General feedback
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Tell us more
      description: "What would you like to see changed or added?"
      placeholder: "e.g. It would be great if I could see which filter list blocked a domain"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: "Screenshots, examples from other tools, or any extra context"
    validations:
      required: false
