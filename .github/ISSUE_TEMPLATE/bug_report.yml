name: Bug Report
description: Something isn't working with the client app, dashboard, or query log
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for letting us know! Just fill in what you can, skip anything that doesn't apply.

        **If your issue is about a domain being blocked or not blocked**, please use the "Blocking Issue" template instead. It has specific guidance for filter list problems.

  - type: dropdown
    id: area
    attributes:
      label: What's the problem about?
      options:
        - Installing or setting up the client
        - The client app (crashes, DNS not working)
        - The dashboard or website
        - Query log or statistics
        - Account or device settings
        - Something else
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Tell us what went wrong. Screenshots, error messages, or steps to reproduce are all helpful."
      placeholder: "e.g. I installed the client on my Mac but the service won't start"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "e.g. The client should start and ads should be blocked"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: What device/system are you using?
      options:
        - Mac
        - Windows
        - Linux
        - iPhone / iPad
        - Android
        - Other
        - Not sure / not relevant
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install the client?
      description: "Skip this if your issue isn't about the client app"
      options:
        - Ran the install command from the setup page
        - Used the Windows installer (.exe)
        - Downloaded manually from GitHub
        - Not sure
        - Didn't install the client (using the website only)
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser (for website/dashboard problems)
      placeholder: "e.g. Chrome, Safari, Firefox"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Any other details that might help, like your client version (`ublockdns version`), error output, or logs.

        Don't worry if you're not sure what to include, we'll ask if we need more info!
    validations:
      required: false
