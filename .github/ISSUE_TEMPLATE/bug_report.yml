name: Bug Report
description: Report a problem with the uBlockDNS client
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The information below helps us diagnose and fix the issue quickly.

  - type: input
    id: client-version
    attributes:
      label: Client version
      description: "Run `ublockdns version` and paste the output"
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows 10
        - Windows 11
        - FreeBSD
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version and architecture
      description: "macOS: `sw_vers` / Linux: `uname -srm` / Windows: `winver`"
      placeholder: "e.g. macOS 15.3 arm64, Ubuntu 24.04 x86_64"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install the client?
      options:
        - Install script (curl | sh)
        - Windows GUI installer (.exe)
        - Windows PowerShell script
        - Manual download from GitHub Releases
        - Built from source
    validations:
      required: true

  - type: textarea
    id: status-output
    attributes:
      label: Output of `ublockdns status`
      description: "Run `ublockdns status` (may need sudo/admin) and paste the full output"
      render: text
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe what went wrong. Include the exact command you ran and the full error output if applicable."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: "What should have happened instead?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        If applicable, include service logs:
        - **Linux**: `journalctl -u ublockdns --no-pager -n 50`
        - **macOS**: `log show --predicate 'process == "ublockdns"' --last 5m`
        - **Windows**: Event Viewer → Windows Logs → System, filter by source "ublockdns"
      render: text
    validations:
      required: false

  - type: dropdown
    id: network
    attributes:
      label: Network environment
      description: "This helps us identify DNS resolution or firewall issues"
      options:
        - Home network
        - Corporate / office network
        - VPN
        - Cloud VM / server
        - Other
    validations:
      required: false

  - type: checkboxes
    id: token
    attributes:
      label: Account token
      description: "Do NOT share your token — just tell us if one was configured"
      options:
        - label: I provided an account token during install
